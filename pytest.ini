[pytest]
# pytest configuration
# This tells pytest where to find tests and how to run them.

# Discover tests in these directories
testpaths = tests

# Only files matching this pattern are test files
python_files = test_*.py

# Only classes matching this pattern are test classes
python_classes = Test*

# Only functions matching this pattern are test functions
python_functions = test_*

# Show extra test summary info for failures and errors
addopts = -v --tb=short

# Display markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
